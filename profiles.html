<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inmobiliaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/profiles.css">
</head>
<body>
    <div class="premium-card text-center" style="max-width: 400px;">
        <img src="img/LOGOV2.png" alt="Logo" class="logo">
        <h2 class="mb-4 font-weight-bold" style="color: #2c3e50;">Bienvenido</h2>
        
        <form id="login-form">
            <div class="form-row text-left">
                <div class="col-12 mb-3">
                    <label>Correo Electrónico</label>
                    <input type="email" class="form-control" id="login-email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="col-12 mb-4">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" id="login-pass" placeholder="Tu contraseña" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-register btn-block">Ingresar</button>
            <p class="mt-3 text-muted" style="font-size: 0.9rem;">¿Aún no tienes cuenta? <a href="login.html" style="color: #1976d2; font-weight: 600;">Regístrate aquí</a></p>
        </form>
    </div>

    <script type="module" src="js/profiles.js"></script>
</body>
</html>
