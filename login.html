<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Inmobiliaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="premium-card text-center">
        <img src="img/LOGOV2.png" alt="Logo" class="logo">
        <h2 class="mb-4 font-weight-bold" style="color: #2c3e50;">Crea tu Cuenta</h2>
        
        <form id="register-form">
            <div class="d-flex justify-content-between mb-4">
                <button type="button" class="btn role-btn comprador-btn" data-role="Comprador">Soy Comprador</button>
                <button type="button" class="btn role-btn vendedor-btn" data-role="Vendedor">Soy Vendedor</button>
            </div>
            
            <input type="hidden" id="user-role" required>
            
            <div class="form-row text-left">
                <div class="col-12 mb-3">
                    <label>Nombre Completo</label>
                    <input type="text" class="form-control" id="reg-name" placeholder="Tu nombre" required>
                </div>
                <div class="col-6 mb-3">
                    <label>Cédula</label>
                    <input type="text" class="form-control" id="reg-id" placeholder="Documento" required>
                </div>
                <div class="col-6 mb-3">
                    <label>Nacimiento</label>
                    <input type="date" class="form-control" id="reg-birth" required>
                </div>
                <div class="col-12 mb-3">
                    <label>Correo Electrónico</label>
                    <input type="email" class="form-control" id="reg-email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="col-12 mb-4">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" id="reg-pass" placeholder="Mínimo 6 caracteres" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-register btn-block">Registrarme</button>
            <p class="mt-3 text-muted" style="font-size: 0.9rem;">¿Ya tienes cuenta? <a href="profiles.html" style="color: #1976d2; font-weight: 600;">Inicia Sesión</a></p>
        </form>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
