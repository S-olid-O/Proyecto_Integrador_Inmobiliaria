<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Inmobiliaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h2><i class="fas fa-users-cog" style="color: #64b5f6; margin-right: 12px;"></i> Panel de Usuarios</h2>
            <a href="home.html" class="btn-home"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
        
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Fecha de Nac.</th>
                        <th>Rol</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <tr><td colspan="5" class="loading"><i class="fas fa-spinner fa-spin"></i> Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
